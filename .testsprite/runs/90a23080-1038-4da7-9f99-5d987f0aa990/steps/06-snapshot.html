:root { --mm-font-label: "Silkscreen", "Galmuri9", "Courier New", monospace; --mm-font-numeric: "VT323", "Galmuri9", "Courier New", monospace; --lightningcss-light: ; --lightningcss-dark: initial; color-scheme: dark; font-family: var(--mm-font-label); font-synthesis: none; letter-spacing: 0px; text-rendering: optimizespeed; background: rgb(16, 14, 20); }
* { box-sizing: border-box; }
html, body, #root { min-height: 100dvh; }
body { background: rgb(16, 14, 20); min-width: 320px; margin: 0px; overflow: hidden; }
button, input { font: inherit; letter-spacing: 0px; }
button { appearance: none; }
img, canvas { image-rendering: pixelated; }
.game-shell { color: rgb(232, 224, 216); background: rgb(16, 14, 20); place-items: center; min-height: 100dvh; display: grid; position: relative; }
.phaser-host { background: rgb(26, 23, 33); border: 2px solid rgb(74, 63, 99); width: min(100vw, 390px); height: min(100dvh, 844px); overflow: hidden; box-shadow: rgb(16, 14, 20) 0px 0px 0px 2px, rgb(8, 7, 10) 4px 4px; }
.phaser-host canvas { display: block; }
.ui-overlay { pointer-events: none; width: min(100vw, 390px); height: min(100dvh, 844px); margin: auto; display: grid; position: absolute; inset: 0px; }
.preboot-splash { z-index: 10; color: rgb(232, 224, 216); pointer-events: auto; background: rgb(16, 14, 20); place-items: center; width: min(100vw, 390px); height: min(100dvh, 844px); display: grid; position: absolute; }
.preboot-copy { text-align: center; gap: 8px; display: grid; }
.preboot-title { color: rgb(230, 180, 80); text-shadow: rgb(8, 7, 10) 2px 0px, rgb(8, 7, 10) 0px 2px, rgb(8, 7, 10) 2px 2px; font-family: DungeonFont, monospace; font-size: 30px; line-height: 1; }
.preboot-loading { color: rgb(154, 143, 168); font-family: var(--mm-font-label); letter-spacing: 1px; text-transform: uppercase; font-size: 10px; line-height: 1; animation: 0.9s steps(2) 0s infinite normal none running splashPulse; }
@keyframes splashPulse { 
  0%, 100% { opacity: 0.35; }
  50% { opacity: 1; }
}
:root { --mm-bg: #100e14; --mm-ui-bg: #1a1721; --mm-panel: #241e2e; --mm-panel-edge: #4a3f63; --mm-panel-hi: #73648c; --mm-ink: #e8e0d8; --mm-muted: #9a8fa8; --mm-gold: #e6b450; --mm-danger: #c4344a; --mm-fire: #e25822; --mm-frost: #6ecbff; --mm-holy: #ffd873; --mm-good: #79c86a; --mm-shadow: #08070a; --mm-corners: polygon(0 4px, 4px 4px, 4px 0, calc(100% - 4px) 0, calc(100% - 4px) 4px, 100% 4px, 100% calc(100% - 4px), calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 100%, 4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px)); }
.game-shell { touch-action: none; user-select: none; }
.hud-strip { z-index: 4; border: 2px solid var(--mm-panel-edge); min-height: 50px; clip-path: var(--mm-corners); background: var(--mm-ui-bg); box-shadow: inset 0 0 0 2px var(--mm-panel-hi), 0 2px 0 var(--mm-shadow); color: var(--mm-ink); pointer-events: auto; grid-template-columns: 0.92fr 0.82fr 0.74fr 1fr 96px; display: grid; position: absolute; top: 0px; left: 0px; right: 0px; }
.hud-stat { border-right: 2px solid var(--mm-panel-edge); align-content: center; gap: 1px; min-width: 0px; padding: 5px 6px; line-height: 1.05; display: grid; }
.hud-stat span { color: var(--mm-muted); font-family: var(--mm-font-label); letter-spacing: 0.5px; text-transform: uppercase; font-size: 10px; }
.hud-stat strong { color: var(--mm-gold); font-family: var(--mm-font-numeric); text-overflow: ellipsis; white-space: nowrap; font-size: 20px; font-weight: 400; line-height: 0.85; overflow: hidden; }
.wizard-stat { border-right: 2px solid var(--mm-panel-edge); }
.hud-actions { background: var(--mm-panel); grid-template-columns: minmax(0px, 1fr) 26px 26px; align-items: center; gap: 3px; min-width: 0px; padding: 5px 4px; display: grid; position: relative; }
.xp-bar { border: 2px solid var(--mm-panel-edge); background: var(--mm-bg); height: 8px; }
.xp-fill { background: var(--mm-good); height: 100%; }
.save-chip { border: 2px solid var(--mm-panel-edge); min-width: 0px; clip-path: var(--mm-corners); background: var(--mm-bg); color: var(--mm-good); font-family: var(--mm-font-label); letter-spacing: 0.5px; text-align: center; text-overflow: clip; white-space: nowrap; padding: 3px 2px; font-size: 10px; line-height: 1; overflow: hidden; }
.save-chip.is-idle { visibility: hidden; }
.save-chip.is-saved { animation: 0.8s steps(2) 0s 1 normal none running saveFlash; }
.save-chip.is-offline { color: var(--mm-muted); opacity: 0.72; }
.settings-btn, .help-btn { border: 2px solid var(--mm-panel-edge); width: 26px; height: 26px; clip-path: var(--mm-corners); background: var(--mm-bg); color: var(--mm-gold); cursor: pointer; box-shadow: inset 0 0 0 2px var(--mm-panel-hi), 2px 2px 0 var(--mm-shadow); place-items: center; display: grid; }
.help-btn { font-family: var(--mm-font-label); font-size: 14px; line-height: 1; }
.settings-glyph { color: currentcolor; width: 14px; height: 14px; position: relative; }
